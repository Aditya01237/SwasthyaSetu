apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
data:
  20-local-memory.conf: |
    vm_memory_high_watermark.absolute = 256MB
    total_memory_available_override_value = 512MB
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      securityContext:
        fsGroup: 101
      initContainers:
        - name: rabbitmq-data-permissions
          image: rabbitmq:3-management-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 100:101 /var/lib/rabbitmq && chmod 700 /var/lib/rabbitmq
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: swasthya-secrets
                  key: rabbitmq-user
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: swasthya-secrets
                  key: rabbitmq-password
          readinessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: amqp
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: amqp
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 300Mi
          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/conf.d/20-local-memory.conf
              subPath: 20-local-memory.conf
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
        - name: rabbitmq-data
          emptyDir: {}
