apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: swasthya-ingress
  namespace: swasthya
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: swasthya.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 8081
      - path: /doctor
        pathType: Prefix
        backend:
          service:
            name: doctor-frontend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: swasthya-frontend
            port:
              number: 80
