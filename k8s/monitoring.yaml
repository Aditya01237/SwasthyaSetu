apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: swasthya-setu
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "api-gateway"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["api-gateway:8080"]

      - job_name: "auth-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["auth-service:8081"]

      - job_name: "patient-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["patient-service:8082"]

      - job_name: "appointment-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["appointment-service:8083"]

      - job_name: "hospital-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["hospital-service:8084"]

      - job_name: "notification-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["notification-service:8086"]

      - job_name: "backend"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets: ["backend:8090"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: swasthya-setu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: swasthya-setu
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: swasthya-setu
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: swasthya-setu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.1
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: grafana-datasources-volume
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-datasources-volume
          configMap:
            name: grafana-datasources

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: swasthya-setu
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
