---
# Horizontal Pod Autoscalers for SwasthyaSetu microservices
# Requires: metrics-server installed in the cluster
# Enable in minikube with: minikube addons enable metrics-server
# NOTE: maxReplicas is set to 1 for local Minikube to prevent CPU-spike
# scale-outs from overloading the single node during Spring Boot startup.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: swasthya-setu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

