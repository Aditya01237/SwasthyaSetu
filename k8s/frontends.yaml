apiVersion: v1
kind: Service
metadata:
  name: swasthya-frontend
spec:
  type: ClusterIP
  selector:
    app: swasthya-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swasthya-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swasthya-frontend
  template:
    metadata:
      labels:
        app: swasthya-frontend
    spec:
      initContainers:
        - name: wait-for-api-gateway
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for api-gateway DNS..."
              until nslookup api-gateway.swasthya-setu.svc.cluster.local > /dev/null 2>&1; do
                echo "api-gateway not yet resolvable, sleeping 3s..."
                sleep 3
              done
              echo "api-gateway is resolvable, starting nginx."
      containers:
        - name: swasthya-frontend
          image: swasthya-setu-swasthya-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /patient/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /patient/
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 10
---
