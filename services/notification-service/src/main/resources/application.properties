spring.application.name=notification-service
server.port=${SERVER_PORT:8086}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# From address: explicit APP_NOTIFICATION_FROM, else authenticated mailbox, else neutral default.
app.notification.from=${APP_NOTIFICATION_FROM:${spring.mail.username:noreply@swasthyasetu.local}}

app.events.exchange=${APP_EVENTS_EXCHANGE:swasthya.events}
app.events.routing-keys.appointment-booked=${APP_EVENTS_APPOINTMENT_BOOKED_ROUTING_KEY:appointment.booked}
app.events.routing-keys.patient-registered=${APP_EVENTS_PATIENT_REGISTERED_ROUTING_KEY:patient.registered}
app.events.routing-keys.otp-requested=${APP_EVENTS_OTP_REQUESTED_ROUTING_KEY:auth.otp-requested}
app.events.queues.appointment-booked=${APP_EVENTS_APPOINTMENT_BOOKED_QUEUE:notification.appointment-booked}
app.events.queues.patient-registered=${APP_EVENTS_PATIENT_REGISTERED_QUEUE:notification.patient-registered}
app.events.queues.otp-requested=${APP_EVENTS_OTP_REQUESTED_QUEUE:notification.otp-requested}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
management.health.rabbit.enabled=${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}
