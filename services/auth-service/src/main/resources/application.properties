spring.application.name=auth-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/swasthyasetudb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:myuser}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

app.events.exchange=${APP_EVENTS_EXCHANGE:swasthya.events}
app.events.routing-keys.otp-requested=${APP_EVENTS_OTP_REQUESTED_ROUTING_KEY:auth.otp-requested}
app.events.routing-keys.patient-registered=${APP_EVENTS_PATIENT_REGISTERED_ROUTING_KEY:patient.registered}
app.events.routing-keys.hospital-upserted=${APP_EVENTS_HOSPITAL_UPSERTED_ROUTING_KEY:hospital.upserted}
app.events.routing-keys.doctor-registered=${APP_EVENTS_DOCTOR_REGISTERED_ROUTING_KEY:doctor.registered}
app.events.queues.auth-patient-registered=${APP_EVENTS_AUTH_PATIENT_REGISTERED_QUEUE:auth.patient-registered}
app.events.queues.auth-hospital-upserted=${APP_EVENTS_AUTH_HOSPITAL_UPSERTED_QUEUE:auth.hospital-upserted}
app.events.queues.auth-doctor-registered=${APP_EVENTS_AUTH_DOCTOR_REGISTERED_QUEUE:auth.doctor-registered}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

jwt.secret=${JWT_SECRET:change-me-to-at-least-32-characters}
jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.rabbit.enabled=${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}
