spring.application.name=patient-service
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/swasthyasetudb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:myuser}

ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

app.events.exchange=${APP_EVENTS_EXCHANGE:swasthya.events}
app.events.routing-keys.patient-registered=${APP_EVENTS_PATIENT_REGISTERED_ROUTING_KEY:patient.registered}
app.events.routing-keys.appointment-booked=${APP_EVENTS_APPOINTMENT_BOOKED_ROUTING_KEY:appointment.booked}
app.events.routing-keys.hospital-upserted=${APP_EVENTS_HOSPITAL_UPSERTED_ROUTING_KEY:hospital.upserted}
app.events.routing-keys.doctor-registered=${APP_EVENTS_DOCTOR_REGISTERED_ROUTING_KEY:doctor.registered}
app.events.queues.patient-appointment-booked=${APP_EVENTS_PATIENT_APPOINTMENT_BOOKED_QUEUE:patient.appointment-booked}
app.events.queues.patient-hospital-upserted=${APP_EVENTS_PATIENT_HOSPITAL_UPSERTED_QUEUE:patient.hospital-upserted}
app.events.queues.patient-doctor-registered=${APP_EVENTS_PATIENT_DOCTOR_REGISTERED_QUEUE:patient.doctor-registered}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.rabbit.enabled=${MANAGEMENT_HEALTH_RABBIT_ENABLED:false}
