spring:
  application:
    name: api-gateway

server:
  port: ${SERVER_PORT:8080}

app:
  services:
    backend-url: ${BACKEND_URL:http://localhost:8081}
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    hospital-url: ${HOSPITAL_SERVICE_URL:http://localhost:8084}
    appointment-url: ${APPOINTMENT_SERVICE_URL:http://localhost:8083}
    patient-url: ${PATIENT_SERVICE_URL:http://localhost:8082}

jwt:
  secret: ${JWT_SECRET:change-me-to-at-least-32-characters}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
