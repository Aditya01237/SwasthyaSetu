server {
    listen 80;
    server_name _;

    # Use K8s cluster DNS for deferred upstream resolution (prevents startup failure)
    resolver 10.96.0.10 valid=10s ipv6=off;

    location = / {
        return 302 /doctor/;
    }

    location /doctor/ {
        alias /usr/share/nginx/html/doctor/;
        try_files $uri $uri/ /doctor/index.html;
    }

    location /api/ {
        set $upstream_api http://api-gateway:8080;
        proxy_pass $upstream_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
