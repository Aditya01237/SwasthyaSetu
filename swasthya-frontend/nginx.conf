server {
    listen 80;
    server_name _;

    # Proxy to api-gateway using the container runtime resolver (Docker 127.0.0.11, K8s pod resolv.conf).
    # Do not hard-code 10.96.0.10 here — that is Minikube/K8s CoreDNS only and breaks Docker Compose (502).

    location = / {
        return 302 /patient/;
    }

    location = /patient {
        return 301 /patient/;
    }

    location /patient/ {
        alias /usr/share/nginx/html/patient/;
        try_files $uri $uri/ /patient/index.html;
    }

    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
