input {
  gelf {
    port => 12201
  }
}

filter {
  if [container_name] {
    mutate {
      add_field => { "docker_container" => "%{[container_name]}" }
    }
  } else if [_container_name] {
    mutate {
      add_field => { "docker_container" => "%{[_container_name]}" }
    }
  }

  if [docker_container] {
    grok {
      match => {
        "docker_container" => "^/?%{DATA:compose_project}-%{DATA:service_name}-%{NUMBER:container_index}$"
      }
      tag_on_failure => []
    }
  }

  if ![service_name] and [tag] {
    mutate {
      add_field => { "service_name" => "%{[tag]}" }
    }
  }

  mutate {
    add_field => { "environment" => "local" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "swasthya-setu-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
